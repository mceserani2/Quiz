<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz interattivo</title>
</head>
<body>
    <h1>Quiz interattivo</h1>
    <div id="start-screen">
        <h2>Benvenuto al quiz!</h2>
        <p>Sei pronto a testare le tue conoscenze?</p>
        <button id="start-btn">Inizia Quiz</button>
    </div>
    <div id="quiz-screen">
        <div id="number"></div>
        <h3 id="question"></h3>
        <div id="choices"></div>
        <button id="next-btn" >Prossima domanda</button>
    </div>
    <div id="result-screen">
        <h2>Quiz completato!</h2>
        <p id="score"></p>
        <button id="restart-btn">Ricomincia</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
